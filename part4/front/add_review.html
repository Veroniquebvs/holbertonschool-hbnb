<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/pink_airbnb.jpg" type="image/png">
</head>
<body>
    <header>
        <div></div>
        <a href="login.html">
            <img src="images/pink_airbnb.jpg" class="logo" alt="logo pink airbnb">
        </a>
        <div class="header-right">
            <a href="login.html" class="login-button">Login</a>
            <button id="logout-btn" style="display:none;">Logout</button>
            <button id="dark-mode-btn"></button>
        </div>
    </header>
    <nav>
        <a href="index.html"> Home </a>
    </nav>
    <main>
        <div class="review-container">
        <section id="place-details" style="display:none;"></section>
        <section id="add-review">           
            <form id="review-form">
                <label>Rating:</label>
                <div id="heart-rating">
                    <span class="heart" data-value="1">♡</span>
                    <span class="heart" data-value="2">♡</span>
                    <span class="heart" data-value="3">♡</span>
                    <span class="heart" data-value="4">♡</span>
                    <span class="heart" data-value="5">♡</span>
                </div>
                <input type="hidden" id="rating" name="rating" value="0">

                <label for="comment">Review:</label>
                <textarea id="comment" name="comment" required></textarea>
    
                <button type="submit">Submit</button>
            </form>
        </section>
        </div>
    </main>
    <script src="scripts.js"></script>
    <footer>
        <p>&copy; 2026 Hbnb Evolution. All rights reserved.</p>
        <img src="images/18.png" alt="Interdit moins 18 ans" class="footer-icon">
    </footer>
</body>
</html>
