<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/pink_airbnb.jpg" type="image/png">
</head>
<body>
    <header>
        <div></div>
        <a href="login.html">
            <img src="images/pink_airbnb.jpg" class="logo" alt="logo pink airbnb">
        </a>
        <div class="header-right">
            <a href="login.html" class="login-button">Login</a>
            <button id="logout-btn" style="display:none;">Logout</button>
            <button id="dark-mode-btn"></button>
        </div>
    </header>
    <nav>
        <a href="index.html">Home</a>
    </nav>
    <main>
        <div class="login-container">
            <h1>Create an account</h1>
            <form id="add-user-form">
                <label for="first_name">First name:</label>
                <input type="text" id="first_name" name="first_name" required>

                <label for="last_name">Last name:</label>
                <input type="text" id="last_name" name="last_name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Create account</button>
            </form>
        </div>
    </main>
    <script src="scripts.js"></script>
    <footer>
        <p>&copy; 2026 Hbnb Evolution. All rights reserved.</p>
        <img src="images/18.png" alt="Interdit moins 18 ans" class="footer-icon">
    </footer>
</body>
</html>
