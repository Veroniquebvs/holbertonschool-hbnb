<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png" type="image/png">
</head>
<body>
    <header>
        <div></div>
        <a href="login.html">
            <img src="images/logo.png" class="logo" alt="logo de Hbnb">
        </a>
        <div class="header-right">
            <a href="login.html" class="login-button">Login</a>
            <button id="logout-btn" style="display:none;">Logout</button>
            <button id="dark-mode-btn"></button>
        </div>
    </header>
    
    <main>
        <div class="welcome-banner">
            <h2>Find your perfect place ✨</h2>
            <p>Discover our handpicked selection of beautiful stays</p>
        </div>
        <section id="filter">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <option value="all">All</option>
                <option value="10">10</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <section id="places-list"></section>
        </section>
       
    </main>
    <script src="scripts.js"></script>
    <footer> <p> &copy; 2026 Hbnb Evolution. All rights reserved. </p> </footer>
</body>
</html>
