<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/pink_airbnb.jpg" type="image/png">
</head>
<body>
    <header>
        <div></div>
        <a href="login.html">
            <img src="images/pink_airbnb.jpg" class="logo" alt="logo pink airbnb">
        </a>
        <div class="header-right">
            <a href="login.html" class="login-button">Login</a>
            <button id="logout-btn" style="display:none;">Logout</button>
            <button id="dark-mode-btn"></button>
        </div>
    </header>
    
    <main>
        <div class="welcome-banner">
            <h2>Find your perfect place 🔥</h2>
            <p>Discover our handpicked selection of beautiful stays</p>
            <a href="add_place.html" class="details-button">+ Add a Place</a>
        </div>
        <section id="filter">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <option value="all">All</option>
                <option value="10">10</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <section id="places-list"></section>
        </section>
       
    </main>
    <script src="scripts.js"></script>
    <footer>
        <p>&copy; 2026 Hbnb Evolution. All rights reserved.</p>
        <img src="images/18.png" alt="Interdit moins 18 ans" class="footer-icon">
    </footer>
</body>
</html>
